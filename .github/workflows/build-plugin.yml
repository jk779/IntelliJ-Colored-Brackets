name: Build and Release Plugin

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plugin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build tested plugin package
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out current branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test plugin
        run: ./gradlew --no-daemon clean check buildPlugin

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd build/distributions
          sha256sum *.zip > SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: colored-brackets-${{ github.run_number }}
          path: |
            build/distributions/*.zip
            build/distributions/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(build/distributions/*.zip)

          if (( ${#packages[@]} == 0 )); then
            echo "No plugin package was produced." >&2
            exit 1
          fi

          short_sha="${GITHUB_SHA:0:12}"
          tag="self-build-${GITHUB_RUN_NUMBER}"

          gh release create "$tag" \
            "${packages[@]}" \
            build/distributions/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Colored Brackets self-build #${GITHUB_RUN_NUMBER}" \
            --notes "Built from the current ${GITHUB_REF_NAME} branch at commit ${GITHUB_SHA}. The Gradle wrapper was validated and the test suite completed before packaging."